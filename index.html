<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ZS-040 Bluetooth Test</title>
</head>
<body>

    <h1>Bluetooth ZS-040 Steuerung</h1>
    
    <button onclick="connectBluetooth()">1. Mit Bluetooth-Modul verbinden</button>
    <hr>

    <h3>Daten senden:</h3>
    <button onclick="send_message(65)">Sende Byte 65 (Buchstabe 'A')</button>
    <button onclick="send_message(66)">Sende Byte 66 (Buchstabe 'B')</button>
    <hr>

    <h3>Empfangene Daten (Live):</h3>
    <div id="output" style="padding: 10px; background: #eee; min-height: 50px;">
        Noch keine Daten empfangen.
    </div>

    <script>
        // --- HIER FÜGST DU DEN JS-CODE VON OBEN EIN ---
        let port;
        let writer;
        let reader;
        let keepReading = true;

        async function connectBluetooth() {
          try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 });
            writer = port.writable.getWriter();
            document.getElementById("output").innerText = "Verbunden! Warte auf Daten...";
            startReading();
          } catch (error) {
            document.getElementById("output").innerText = "Fehler: " + error;
          }
        }

        async function send_message(datenbyte) {
          if (!writer) return;
          const data = new Uint8Array([datenbyte]);
          await writer.write(data);
        }

        async function startReading() {
          while (port.readable && keepReading) {
            reader = port.readable.getReader();
            try {
              while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                if (value) {
                  for (let i = 0; i < value.length; i++) {
                    read_message(value[i]);
                  }
                }
              }
            } catch (error) {
              console.error(error);
            } finally {
              reader.releaseLock();
            }
          }
        }

        // DEINE EMPFANGS-FUNKTION:
        function read_message(datenbyte) {
          // Schreibt das empfangene Byte direkt auf die Website
          const outputDiv = document.getElementById("output");
          outputDiv.innerHTML += `<br>Byte empfangen: <b>${datenbyte}</b>`;
        }
    </script>
</body>
</html>
