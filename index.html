    <link rel="stylesheet" href="./style.css">

<body>

    <header>
        <div class="red_glass icon">Hallo</div>
        <div class="green_glass icon">Hallo</div>
        <div class="invisible_glass icon">Hallo</div>
        <div class="invisible_glass icon">Hola</div>
        <div class="invisible_glass icon">Shalom</div>

    <div class="ground">

            <input type="range" class="aero_slider" min="0" max="100" value="50" id="slider_1">

            <div id="show_temp">50</div>

        </div>
    </div>
